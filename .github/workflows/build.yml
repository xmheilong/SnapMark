name: Build Tauri App

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'             # 推送 v1.0.0, v1.0.1 等标签时自动触发

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''
          - platform: 'ubuntu-24.04'
            args: ''
          - platform: 'ubuntu-24.04-arm'
            args: ''

    runs-on: ${{ matrix.platform }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies (Ubuntu only)
        if: contains(matrix.platform, 'ubuntu-24.04')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libudev-dev xdg-utils

      - name: Install frontend dependencies
        run: bun install

      - name: Get version from tauri.conf.json
        id: get_version
        shell: bash
        run: |
          VERSION=$(cat src-tauri/tauri.conf.json | grep -o '"version": *"[^"]*"' | head -1 | sed 's/"version": *"\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v${{ steps.get_version.outputs.version }}
          releaseName: 'Penio v${{ steps.get_version.outputs.version }}'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: false          # 改为 false，自动发布正式版
          prerelease: false
          args: ${{ matrix.args }}