name: Build Tauri App

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''
          - platform: 'ubuntu-24.04'
            args: ''
          - platform: 'ubuntu-24.04-arm'
            args: ''

    runs-on: ${{ matrix.platform }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies (Ubuntu only)
        if: contains(matrix.platform, 'ubuntu-24.04')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libudev-dev xdg-utils

      - name: Install frontend dependencies
        run: bun install

      - name: Get version from tauri.conf.json
        id: get_version
        shell: bash
        run: |
          VERSION=$(cat src-tauri/tauri.conf.json | grep -o '"version": *"[^"]*"' | head -1 | sed 's/"version": *"\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v${{ steps.get_version.outputs.version }}
          releaseName: 'SnapMark v${{ steps.get_version.outputs.version }}'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  # ======================================================
  # 新增：构建成功后自动同步代码到 Gitee
  # ======================================================
  sync-to-gitee:
    name: Sync to Gitee
    runs-on: ubuntu-latest
    needs: [build]        # 等待上面的 build job 完成
    if: success()         # 只有 build 全部成功才执行
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Gitee
        env:
          GITEE_USERNAME: ${{ secrets.GITEE_USERNAME }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # ↓↓↓ 把下面这行的 "你的Gitee用户名" 替换成你真实的 Gitee 用户名 ↓↓↓
          git remote add gitee https://${GITEE_USERNAME}:${GITEE_TOKEN}@gitee.com/xmheilong/SnapMark.git
          git push gitee main --force
